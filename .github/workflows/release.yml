name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          VITE_ANALYTICS_ENDPOINT: https://sidethreadgpt.com/api/extension-events
          VITE_ANALYTICS_BASE: https://sidethreadgpt.com
          VITE_PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}

      - run: mv release/release.zip "release/${{ github.event.repository.name }}-${{ github.ref_name }}-${GITHUB_SHA:0:7}.zip"

      - uses: softprops/action-gh-release@v2
        with:
          files: release/${{ github.event.repository.name }}-${{ github.ref_name }}-${GITHUB_SHA:0:7}.zip
